<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildEvo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div class="logo">WILDEVO</div>

  <div class="bar">
    <div id="fill"></div>
  </div>

  <div id="percent">0%</div>
</div>

<!-- LOBBY -->
<div id="lobby" class="hidden">

  <!-- TOP LEFT -->
  <div class="top-left">
    🇷🇺 WEST EUROPE 1 #1<br>
    Level: <span id="level">0</span>

    <div class="xp-bar">
      <div id="xpFill"></div>
      <div id="xpText">0/100</div>
    </div>
  </div>

  <!-- USERNAME -->
  <div class="username">
    <input id="username" value="ELIOT">
  </div>

  <!-- PLAY -->
  <div class="center">
    <button onclick="alert('Game Start!')">PLAY</button>
  </div>

  <!-- MENU -->
  <div class="menu-right">
    <button onclick="openTasks()">TASKS</button>
    <button>SHOP</button>
    <button>LEADERBOARD</button>
    <button>SETTINGS</button>
  </div>

  <!-- TASKS -->
  <div id="tasks" class="tasks hidden">
    <h2>TASKS</h2>

    <button onclick="completeTask(100)">Evolve 15 times (+100 XP)</button>
    <button onclick="completeTask(100)">Eat 5 bread (+100 XP)</button>
    <button onclick="completeTask(100000)">Evolve to Ghost (+100000 XP)</button>

    <button onclick="closeTasks()">CLOSE</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
