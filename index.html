<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="loadingBar">
    <div id="fill"></div>
    <div id="percent">0%</div>
</div>
    
<button id="playBtn" style="display:none;">PLAY</button>

<script>
let progress = 0;

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const playBtn = document.getElementById("playBtn");

const loading = setInterval(function(){

    progress++;

    fill.style.width = progress + "%";
    percent.innerHTML = progress + "%";

   if(progress >= 100){

    clearInterval(loading);

    percent.innerHTML = "PLAY";

    document.getElementById("loadingBar").style.cursor = "pointer";

    document.getElementById("loadingBar").onclick = function(){

        document.getElementById("loadingBar").style.display = "none";

        document.getElementById("background").style.display = "none";

        document.body.innerHTML += `
        <div id="lobby" style="
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:#0b0f14;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            font-size:40px;
        ">
            <h1>WILDEVO LOBBY</h1>

            <button onclick="alert('Game Start!')" style="
                padding:20px 40px;
                font-size:20px;
                background:lime;
                border:none;
                cursor:pointer;
            ">
                PLAY GAME
            </button>
        </div>
        `;

    };
}

},50);

</script>
    
<script src="script.js"></script>
<script src="lobby.js"></script>
    
</body>
</html>
