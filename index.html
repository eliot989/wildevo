<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:black;
}

/* IMAGINEA TA */
#bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/loading.png") center/cover no-repeat;
}

/* OVERLAY NEGRU */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

/* TITLU */
h1{
font-size:80px;
text-shadow:0 0 20px #00ff66;
}

/* LOADING BAR */
.bar{
width:520px;
height:22px;
background:#111;
border:2px solid #333;
border-radius:30px;
overflow:hidden;
margin-top:40px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff66,#00ffaa,#00ff66);
}

/* PROCENT */
#percent{
margin-top:15px;
font-size:25px;
color:#00ff66;
}

/* TEXT MIC */
#text{
margin-top:10px;
color:#aaa;
font-size:16px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="overlay">

<h1>🦅 WILD EVO</h1>

<div class="bar">
<div class="progress" id="bar"></div>
</div>

<div id="percent">0%</div>
<div id="text">Loading world...</div>

</div>

<script>

let p = 0;
let bar = document.getElementById("bar");
let percent = document.getElementById("percent");

let loading = setInterval(()=>{

p++;
bar.style.width = p + "%";
percent.innerHTML = p + "%";

if(p >= 100){
clearInterval(loading);

document.getElementById("overlay").innerHTML = `
<h1>🔥 START GAME 🔥</h1>
`;
}

},50);

</script>

</body>
</html>
