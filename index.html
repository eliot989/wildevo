<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#050505;
}

#loading{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:
radial-gradient(circle at top,#1b5e20,#071107,#000);
color:white;
}

#loading::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(rgba(255,255,255,.08) 2px,transparent 2px);
background-size:60px 60px;
animation:bgMove 20s linear infinite;
opacity:.3;
}

@keyframes bgMove{
from{transform:translate(0,0);}
to{transform:translate(-300px,-300px);}
}

.logo{
font-size:90px;
font-weight:bold;
letter-spacing:4px;
text-shadow:
0 0 15px #00ff66,
0 0 40px #00ff66,
0 0 70px #00ff66;
z-index:2;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

.status{
margin-top:25px;
font-size:20px;
color:#ddd;
z-index:2;
}

.bar{
margin-top:35px;
width:450px;
height:24px;
background:#1d1d1d;
border-radius:50px;
overflow:hidden;
border:2px solid #555;
z-index:2;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff66,#7CFC00,#00ff66);
box-shadow:0 0 25px #00ff66;
transition:width .05s linear;
}

.percent{
margin-top:15px;
font-size:28px;
font-weight:bold;
color:#7CFC00;
z-index:2;
}

#menu{
display:none;
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#63c74d,#2d7f2d);
justify-content:center;
align-items:center;
font-size:70px;
color:white;
}
</style>
</head>

<body>

<div id="loading">

<div class="logo">🦅 WildEvo</div>

<div class="status" id="status">
Initializing...
</div>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<div id="menu">
🔥 WildEvo 🔥
</div>

<script>

let p=0;

const texts=[
"Loading textures...",
"Generating world...",
"Loading animals...",
"Connecting server...",
"Preparing adventure..."
];

const bar=document.getElementById("progress");
const percent=document.getElementById("percent");
const status=document.getElementById("status");

let i=0;

const load=setInterval(()=>{

p++;

bar.style.width=p+"%";
percent.innerHTML=p+"%";

if(p==20){status.innerHTML=texts[1];}
if(p==40){status.innerHTML=texts[2];}
if(p==60){status.innerHTML=texts[3];}
if(p==80){status.innerHTML=texts[4];}

if(p>=100){

clearInterval(load);

setTimeout(()=>{

document.getElementById("loading").style.display="none";
document.getElementById("menu").style.display="flex";

},200);

}

},50);

</script>

</body>
</html>
