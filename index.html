<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
}

/* Imaginea ta */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("assets/loading.png") center center/cover no-repeat;
}

/* Bara nouă peste bara din imagine */
#loadingBar{
position:fixed;
top:62px;          /* modifică dacă trebuie */
left:50%;
transform:translateX(-50%);
width:520px;
height:22px;
background:#1b1b1b;
border-radius:20px;
overflow:hidden;
border:2px solid #222;
z-index:1000;
}

#loadingFill{
width:0%;
height:100%;
background:linear-gradient(90deg,#00ff55,#6dff6d);
transition:width .05s linear;
}

#percent{
position:fixed;
top:92px;
left:50%;
transform:translateX(-50%);
font-family:Arial;
font-size:18px;
font-weight:bold;
color:white;
text-shadow:0 0 8px black;
z-index:1001;
}

</style>

</head>

<body>

<div id="bg"></div>

<div id="loadingBar">
<div id="loadingFill"></div>
</div>

<div id="percent">0%</div>

<script>

let progress=0;

const fill=document.getElementById("loadingFill");
const text=document.getElementById("percent");

const loading=setInterval(()=>{

progress++;

fill.style.width=progress+"%";
text.innerHTML=progress+"%";

if(progress>=100){
clearInterval(loading);
}

},50);

</script>

</body>
</html>
