<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center,#0a0a0a,#000);
}

/* MAIN CONTAINER */
#loading{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:10;
}

/* LOGO */
.logo{
font-size:90px;
font-weight:bold;
text-shadow:
0 0 10px #00ff66,
0 0 20px #00ff66,
0 0 40px #00ff66;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

/* SUB TEXT */
.sub{
margin-top:10px;
color:#aaa;
font-size:18px;
}

/* LOADING BAR */
.bar{
margin-top:40px;
width:600px;
height:22px;
background:#111;
border:2px solid #333;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff66,#00ffaa,#00ff66);
box-shadow:0 0 25px #00ff66;
transition:width .1s;
}

/* PERCENT */
.percent{
margin-top:15px;
font-size:28px;
color:#00ff66;
}

/* FLOATING CREATURES */
.creature{
position:absolute;
font-size:45px;
opacity:0.85;
animation:float linear infinite;
filter:drop-shadow(0 0 10px #00ff66);
}

@keyframes float{
from{transform:translateY(120vh);}
to{transform:translateY(-20vh);}
}

/* MENU */
#menu{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
font-size:60px;
color:white;
background:linear-gradient(#2b7a2b,#0a0a0a);
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="loading">

<div class="logo">WILD EVO</div>
<div class="sub">Evolve. Survive. Dominate.</div>

<div class="bar">
<div class="progress" id="bar"></div>
</div>

<div class="percent" id="percent">0%</div>

</div>

<div id="menu">
🔥 WILDEVO GAME STARTED 🔥
</div>

<script>

/* 🪰🐞🦋🔥🦅 creatures like evo world */
const creatures=["🪰","🐞","🦋","🔥","🦅","🐺","🦂"];

for(let i=0;i<40;i++){
let c=document.createElement("div");
c.className="creature";
c.innerHTML=creatures[Math.floor(Math.random()*creatures.length)];
c.style.left=Math.random()*100+"%";
c.style.animationDuration=(4+Math.random()*8)+"s";
c.style.fontSize=(20+Math.random()*50)+"px";
document.body.appendChild(c);
}

/* LOADING SYSTEM */
let p=0;
let bar=document.getElementById("bar");
let percent=document.getElementById("percent");

let load=setInterval(()=>{

p++;
bar.style.width=p+"%";
percent.innerHTML=p+"%";

if(p>=100){
clearInterval(load);

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("menu").style.display="flex";
},400);
}

},50);

</script>

</body>
</html>
