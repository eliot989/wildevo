<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="loadingBar">
    <div id="fill"></div>
    <div id="percent">0%</div>
</div>
    
<button id="playBtn" style="display:none;">PLAY</button>

<script>
let progress = 0;

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const playBtn = document.getElementById("playBtn");

const loading = setInterval(function(){

    progress++;

    fill.style.width = progress + "%";
    percent.innerHTML = progress + "%";

   if(progress >= 100){

    clearInterval(loading);

percent.innerHTML = "PLAY";

document.getElementById("loadingBar").style.cursor = "pointer";

document.getElementById("loadingBar").onclick = function(){

    document.getElementById("loadingBar").style.display = "none";
    document.getElementById("background").style.display = "none";

    document.body.innerHTML += `
    
    <div id="lobby">

        <div class="topLeft">
            🇷🇺 WEST EUROPE 1 #1<br>
            Level 0
        </div>

        <div class="xp">
            <div class="xpFill"></div>
            <div class="xpText">0/100</div>
        </div>

        <div class="username">
            <input placeholder="USERNAME">
        </div>

        <div class="center">
            <button onclick="alert('PLAY GAME')">PLAY</button>
        </div>

        <div class="rightMenu">
            <button>SHOP</button>
            <button>TASKS</button>
            <button>SETTINGS</button>
        </div>

    </div>

    `;
};
       
},50);

</script>
    
<script src="script.js"></script>
<script src="lobby.js"></script>
    
</body>
</html>
