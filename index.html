<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:black;
}

/* IMAGINEA TA */
#bg{
position:fixed;
width:100%;
height:100%;
background:url("assets/loading.png") center/cover no-repeat;
}

/* OVERLAY NEGRU (ca să arate mai cool textul) */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

/* LOGO */
h1{
font-size:80px;
text-shadow:0 0 20px #00ff66;
}

/* BAR */
.bar{
width:500px;
height:20px;
background:#111;
border:2px solid #333;
border-radius:20px;
overflow:hidden;
margin-top:40px;
}

.progress{
height:100%;
width:0%;
background:#00ff66;
}

/* PERCENT */
#percent{
margin-top:15px;
font-size:25px;
color:#00ff66;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="overlay">

<h1>🦅 WILD EVO</h1>

<div class="bar">
<div class="progress" id="bar"></div>
</div>

<div id="percent">0%</div>

</div>

<script>

let p = 0;

let bar = document.getElementById("bar");
let percent = document.getElementById("percent");

let load = setInterval(()=>{

p++;
bar.style.width = p + "%";
percent.innerHTML = p + "%";

if(p >= 100){
clearInterval(load);
document.getElementById("overlay").innerHTML = "🔥 START GAME 🔥";
}

},50);

</script>

</body>
</html>
