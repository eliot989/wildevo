<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildEvo Lobby</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP LEFT PLAYER INFO -->
<div class="top-left">
  <div>🇷🇺 WEST EUROPE 1 #1</div>
  <div>Level: <span id="level">0</span></div>

  <div class="xp-bar">
    <div id="xpFill"></div>
    <span id="xpText">0/100</span>
  </div>
</div>

<!-- USERNAME -->
<div class="username-box">
  <input id="username" value="ELIOT">
</div>

<!-- CENTER PLAY -->
<div class="center">
  <button onclick="playGame()">PLAY</button>
</div>

<!-- MENU -->
<div class="menu-left">
  <button onclick="openTasks()">TASKS</button>
</div>

<div class="menu-right">
  <button>SHOP</button>
  <button>LEADERBOARD</button>
  <button>SETTINGS</button>
</div>

<!-- TASKS -->
<div id="tasks" class="tasks hidden">
  <h2>TASKS</h2>

  <button onclick="completeTask(100, 15)">Evolve 15 times (+100 XP)</button>
  <button onclick="completeTask(100, 5)">Eat 5 bread (+100 XP)</button>
  <button onclick="completeTask(100000, 1)">Evolve to Ghost (+100000 XP)</button>

  <button onclick="closeTasks()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
