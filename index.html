<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="loadingBar">
    <!-- LOBBY (ASCUNS LA START) -->
<div id="lobby">

    <!-- LEFT PANEL TASKS -->
    <div class="leftPanel">

        <div class="card">
            <img src="assets/animal.png">
            <div>Level 0</div>
        </div>

        <div class="task">
            <h3>Evolve 15 times</h3>
            <p>0/15</p>
            <span>+3750 XP</span>
        </div>

        <div class="task">
            <h3>Eat 5 bread</h3>
            <p>0/5</p>
            <span>+1750 XP</span>
        </div>

        <div class="task">
            <h3>Evolve to Ghost</h3>
            <p>0/1</p>
            <span>+302500 XP</span>
        </div>

    </div>

    <!-- TOP BAR -->
    <div class="topBar">

        <div class="region">
            🇷🇺 West Europe 1 (172/300)
        </div>

        <button class="playBtn">▶ PLAY</button>

        <div class="usernameBox">[ username ]</div>

    </div>

    <!-- RIGHT MENU -->
    <div class="rightMenu">
        <button>👑 SHOP</button>
        <button>🏆 LEADERBOARDS</button>
        <button>⚙ SETTINGS</button>
    </div>

</div>
    <div id="fill"></div>
    <div id="percent">0%</div>
</div>
    
<button id="playBtn" style="display:none;">PLAY</button>

<script>
    
let progress = 0;

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");

let loading = setInterval(() => {

progress++;

fill.style.width = progress + "%";
percent.innerHTML = progress + "%";

if (progress >= 100) {

clearInterval(loading);

// 👉 schimbăm doar textul
percent.innerHTML = "PLAY";

// 👉 ACTIVĂ CLICK PE BARĂ
document.getElementById("loadingBar").style.cursor = "pointer";

document.getElementById("loadingBar").onclick = function () {

// 🔥 ASCUNDEM LOADING (NU ȘTERGEM DOM)
document.getElementById("loadingBar").style.display = "none";
document.getElementById("background").style.display = "none";

// 🔥 ARĂTĂM LOBBY (EXISTENT DIN HTML)
document.getElementById("lobby").style.display = "block";

};

}

},
30);

</script>
 <div id="lobby" style="display:none;">

    <!-- TOP LEFT PLAYER INFO -->
    <div class="topLeft">
        🇷🇺 WEST EUROPE 1<br>
        <span class="id">#1</span>
        <br>
        Level 0
    </div>

    <!-- XP BAR -->
    <div class="xpBar">
        <div class="xpFill"></div>
        <div class="xpText">0/100</div>
    </div>

    <!-- USERNAME (SEPARAT JOS) -->
    <div class="usernameBox">
        <input value="ELIOT" placeholder="username">
    </div>

    <!-- CENTER PLAY -->
    <div class="centerPlay">
        <button onclick="startGame()">PLAY</button>
    </div>

    <!-- RIGHT MENU -->
    <div class="rightMenu">
        <button>SHOP</button>
        <button>TASKS</button>
        <button>SETTINGS</button>
    </div>

</div>
    
<script src="script.js"></script>
<script src="lobby.js"></script>
    
</body>
</html>
