<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#000;
}

#loading{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#163c16,#071007,#000);
}

#particles{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.5;
animation:float linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-10vh);
}
}

.logo{
font-size:90px;
color:white;
font-weight:bold;
text-shadow:
0 0 10px #00ff66,
0 0 20px #00ff66,
0 0 40px #00ff66,
0 0 80px #00ff66;
animation:pulse 2s infinite;
z-index:2;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

.loadingText{
margin-top:25px;
font-size:22px;
color:#ddd;
z-index:2;
}

.bar{
margin-top:35px;
width:500px;
height:24px;
background:#111;
border-radius:30px;
overflow:hidden;
border:2px solid #555;
z-index:2;
}

.progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#00ff66,#66ff99,#00ff66);
box-shadow:0 0 20px #00ff66;
}

.percent{
margin-top:15px;
font-size:28px;
color:#7CFC00;
font-weight:bold;
z-index:2;
}

#menu{
display:none;
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#68c45a,#2b8b35);
justify-content:center;
align-items:center;
font-size:70px;
color:white;
}

</style>

</head>
<body>

<div id="loading">

<div id="particles"></div>

<div class="logo">
🦅 WildEvo
</div>

<div class="loadingText" id="status">
Initializing...
</div>

<div class="bar">
<div class="progress" id="progress"></div>
</div>

<div class="percent" id="percent">
0%
</div>

</div>

<div id="menu">
🔥 WildEvo 🔥
</div>

<script>

const particles=document.getElementById("particles");

for(let i=0;i<120;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=(5+Math.random()*8)+"s";

p.style.animationDelay=Math.random()*5+"s";

particles.appendChild(p);

}

const status=document.getElementById("status");

const percent=document.getElementById("percent");

const progress=document.getElementById("progress");

const text=[
"Loading textures...",
"Loading world...",
"Loading animals...",
"Preparing map...",
"Connecting...",
"Almost done..."
];

let value=0;

let timer=setInterval(()=>{

value++;

progress.style.width=value+"%";

percent.innerHTML=value+"%";

if(value==15)status.innerHTML=text[1];
if(value==35)status.innerHTML=text[2];
if(value==55)status.innerHTML=text[3];
if(value==75)status.innerHTML=text[4];
if(value==90)status.innerHTML=text[5];

if(value>=100){

clearInterval(timer);

setTimeout(()=>{

document.getElementById("loading").style.display="none";

document.getElementById("menu").style.display="flex";

},300);

}

},50);

</script>

</body>
</html>
