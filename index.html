<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
overflow:hidden;
}

/* BACKGROUND */
#bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center, #0a0a0a, black);
}

/* FLOATING ANIMALS */
.animal{
position:absolute;
font-size:40px;
opacity:0.8;
animation:fly linear infinite;
filter:drop-shadow(0 0 10px rgba(0,255,100,0.7));
}

@keyframes fly{
from{
transform:translateY(110vh) translateX(0);
}
to{
transform:translateY(-20vh) translateX(100px);
}
}

/* LOADING CONTAINER */
#loading{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:10;
}

h1{
font-size:80px;
text-shadow:0 0 20px #00ff66;
}

/* BAR */
.bar{
width:500px;
height:25px;
background:#111;
border:2px solid #333;
border-radius:20px;
overflow:hidden;
margin-top:30px;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff66,#00ffaa,#00ff66);
box-shadow:0 0 20px #00ff66;
}

/* TEXT */
#text{
margin-top:20px;
font-size:20px;
color:#aaa;
}

#percent{
margin-top:10px;
font-size:25px;
color:#00ff66;
}

/* MENU */
#menu{
display:none;
width:100%;
height:100%;
justify-content:center;
align-items:center;
color:white;
font-size:60px;
}
</style>
</head>

<body>

<div id="bg"></div>

<div id="loading">

<h1>🦅 WILDEVO</h1>

<div class="bar">
<div class="progress" id="bar"></div>
</div>

<div id="percent">0%</div>
<div id="text">Spawning creatures...</div>

</div>

<div id="menu">
🔥 GAME STARTED 🔥
</div>

<script>

/* ANIMALS (musca, ladybug, phoenix vibe) */
const icons=["🪰","🐞","🦋","🔥","🦅"];

for(let i=0;i<25;i++){
let a=document.createElement("div");
a.className="animal";
a.innerHTML=icons[Math.floor(Math.random()*icons.length)];
a.style.left=Math.random()*100+"%";
a.style.animationDuration=(5+Math.random()*8)+"s";
a.style.fontSize=(20+Math.random()*40)+"px";
document.body.appendChild(a);
}

/* LOADING */
let p=0;

let text=[
"Spawning creatures...",
"Generating world...",
"Loading animals...",
"Connecting server...",
"Finalizing..."
];

let bar=document.getElementById("bar");
let percent=document.getElementById("percent");
let t=document.getElementById("text");

let i=0;

let load=setInterval(()=>{

p++;

bar.style.width=p+"%";
percent.innerHTML=p+"%";

if(p==20) t.innerHTML=text[1];
if(p==40) t.innerHTML=text[2];
if(p==60) t.innerHTML=text[3];
if(p==80) t.innerHTML=text[4];

if(p>=100){
clearInterval(load);

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("menu").style.display="flex";
},300);
}

},50);

</script>

</body>
</html>
🔥 Ce ai acum:
fundal negru cinematic
🪰
