<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="loadingBar">
    <div id="fill"></div>
    <div id="percent">0%</div>
</div>
    
<button id="playBtn" style="display:none;">PLAY</button>

<script>
    
let progress = 0;

window.onload = function () {

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");

if (!fill || !percent) {
console.log("ERROR: missing loading elements");
return;
}

let loading = setInterval(() => {

progress++;

fill.style.width = progress + "%";
percent.innerHTML = progress + "%";

if (progress >= 100) {

clearInterval(loading);

percent.innerHTML = "PLAY";

document.getElementById("loadingBar").style.cursor = "pointer";

document.getElementById("loadingBar").onclick = function () {

document.getElementById("loadingBar").style.display = "none";
document.getElementById("background").style.display = "none";

document.body.innerHTML += `
<div id="lobby">
<h1 style="color:white;text-align:center;margin-top:200px;">
WILDEVO LOBBY
</h1>

<div style="text-align:center;">
<button onclick="alert('PLAY GAME')" style="padding:20px 40px;background:lime;">
PLAY
</button>
</div>
</div>
`;
};

}

}, 30);

};

</script>
 <div id="lobby" style="display:none;">

    <!-- TOP LEFT PLAYER INFO -->
    <div class="topLeft">
        🇷🇺 WEST EUROPE 1<br>
        <span class="id">#1</span>
        <br>
        Level 0
    </div>

    <!-- XP BAR -->
    <div class="xpBar">
        <div class="xpFill"></div>
        <div class="xpText">0/100</div>
    </div>

    <!-- USERNAME (SEPARAT JOS) -->
    <div class="usernameBox">
        <input value="ELIOT" placeholder="username">
    </div>

    <!-- CENTER PLAY -->
    <div class="centerPlay">
        <button onclick="startGame()">PLAY</button>
    </div>

    <!-- RIGHT MENU -->
    <div class="rightMenu">
        <button>SHOP</button>
        <button>TASKS</button>
        <button>SETTINGS</button>
    </div>

</div>
    
<script src="script.js"></script>
<script src="lobby.js"></script>
    
</body>
</html>
