<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildEvo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="background"></div>

<div id="loadingBar">
    <div id="fill"></div>
    <div id="percent">0%</div>
</div>
    
<button id="playBtn" style="display:none;">PLAY</button>

<script>
    
let progress = 0;

window.onload = function () {

const fill = document.getElementById("fill");
const percent = document.getElementById("percent");

if (!fill || !percent) {
console.log("ERROR: missing loading elements");
return;
}

let loading = setInterval(() => {

progress++;

fill.style.width = progress + "%";
percent.innerHTML = progress + "%";

if (progress >= 100) {

clearInterval(loading);

percent.innerHTML = "PLAY";

document.getElementById("loadingBar").style.cursor = "pointer";

document.getElementById("loadingBar").onclick = function () {

document.getElementById("loadingBar").style.display = "none";
document.getElementById("background").style.display = "none";

document.body.innerHTML += `
<div id="lobby">
<h1 style="color:white;text-align:center;margin-top:200px;">
WILDEVO LOBBY
</h1>

<div style="text-align:center;">
<button onclick="alert('PLAY GAME')" style="padding:20px 40px;background:lime;">
PLAY
</button>
</div>
</div>
`;
};

}

}, 30);

};

</script>
    
<script src="script.js"></script>
<script src="lobby.js"></script>
    
</body>
</html>
